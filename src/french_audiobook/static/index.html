<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>French Audiobook</title>
    <style>
      :root {
        color: #1c2526;
        background: #f4f6f1;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        width: min(680px, calc(100vw - 32px));
        border: 1px solid #d3d9d1;
        border-radius: 8px;
        background: #ffffff;
        padding: 28px;
      }

      h1 {
        margin: 0 0 10px;
      }

      p {
        line-height: 1.5;
      }

      code {
        border-radius: 4px;
        background: #edf2ef;
        padding: 2px 5px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>French Audiobook</h1>
      <p>The v1 interface now lives in the React app source.</p>
      <p>Run <code>npm install</code>, then <code>npm run dev</code> for development or <code>npm run build</code> to publish the React bundle into this static directory.</p>
    </main>
  </body>
</html>
